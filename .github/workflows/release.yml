name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    uses: ./.github/workflows/build-linux.yml

  build-windows:
    uses: ./.github/workflows/build-windows.yml

  build-macos:
    uses: ./.github/workflows/build-macos.yml

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip

  aur:
    needs: [build-linux, release]
    uses: ./.github/workflows/publish-aur.yml
    with:
      version: ${{ needs.build-linux.outputs.version }}
      sha256: ${{ needs.build-linux.outputs.sha256 }}
    secrets: inherit

  ppa:
    needs: [build-linux, release]
    uses: ./.github/workflows/publish-ppa.yml
    with:
      version: ${{ needs.build-linux.outputs.version }}
      tag: ${{ needs.build-linux.outputs.tag }}
    secrets: inherit

  brew:
    needs: [build-linux, release]
    uses: ./.github/workflows/publish-brew.yml
    with:
      version: ${{ needs.build-linux.outputs.version }}
      tag: ${{ needs.build-linux.outputs.tag }}
      sha256: ${{ needs.build-linux.outputs.sha256 }}
    secrets: inherit